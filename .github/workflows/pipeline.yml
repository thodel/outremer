name: Pipeline (extract persons + build site data)

on:
  push:
    branches: ["main"]
    # Don't re-run when the bot itself pushes data
    paths-ignore:
      - "site/data/**"
      - "site/bib/**"
      - "site/index.json"
      - "bib/**"
      - "data/staging/**"
      - "data/decisions.json"
      - "data/wikidata_matches.json"
      - "data/entity_feedback.json"
      - "requirements.lock.txt"
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # nightly 02:00 UTC

# Only one pipeline run at a time; cancel in-progress on new push
concurrency:
  group: pipeline
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip freeze > requirements.lock.txt

      # ── CI extraction path ────────────────────────────────────────────────────
      # GitHub Actions cannot reach the internal GPUStack endpoint (tei.dh.unibe.ch).
      # CI therefore runs in HEURISTIC mode — the committed site/data/ artifacts are
      # produced by the fallback engine, not GPUStack.  This is an explicit design
      # decision: production-quality extractions come from local GPUStack runs; CI
      # only refreshes the H-i-t-L UI structure.
      #
      # To audit which engine produced a given artifact, check site/index.json:
      #   extraction_engine: "heuristic" | "gpustack"
      #   ocr_engine:        "easyocr"   | "gpustack" | "mistral"
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run pipeline (heuristic mode — no GPUStack access in CI)
        run: |
          python scripts/run_pipeline.py --genai-metadata

      - name: Configure SSH for push
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote set-url origin git@github.com:thodel/outremer.git

      - name: Commit generated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/index.json site/data site/bib bib requirements.lock.txt data/entity_feedback.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update extracted site data [skip ci]"
            git pull --rebase origin main
            git push
          fi
