name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  PYTHON: '3.12'

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
      - run: pip install ruff
      - run: ruff check scripts/ tests/ --output-format=github

  test:
    name: Pytest (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON }}
      # No silent fallback: if either install fails, the job must fail —
      # a swallowed install error previously left pytest missing entirely.
      # Runtime deps come from the lockfile so CI matches the nightly
      # pipeline exactly; bump deps by regenerating requirements.lock.txt.
      - run: pip install -r requirements.lock.txt
      - run: pip install -e '.[dev]'
      - run: python -m pytest tests/ -v --ignore=tests/test_llm_client.py
      # Offline evaluation over fixture snapshots. Gate is a regression
      # floor below the 2026-07-12 system-aware baseline (combined 0.9014:
      # authority 0.8727, wikidata 1.0); raise it as linking improves.
      - run: python -m evaluation.harness --min-agreement 0.85

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # Only build Docker on tag pushes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: thodel/outremer:${{ env.VERSION }},thodel/outremer:latest